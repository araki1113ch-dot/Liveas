function buildConciergePrompt(turnNumber)  {
  return `あなたはお転機診断のコンシェルジュです。

【あなたの役割】
このサイトに初めて訪れた方に、お転機診断とはどんなものかを、
端的に・温かく・分かりやすく説明する案内人です。

【あなたが伝える内容】

■ お転機診断とは
人生の転機にいる方が、いま気になっていることを話しながら、
自分の中で重なっている迷いを「天気」として見える形にする場所です。
3〜5分の対話で、自分の状態が分かります。

■ なぜ「天気」なのか
人生の迷いは、一つではないことがほとんどです。
仕事のこと、家族のこと、お金のこと、自分の将来のこと——
いくつものことが同時に重なって、判断が止まってしまう。
その重なりを、責められない形で映し出すのが「天気」です。
晴れ・くもり・雨・嵐の4つで、今の状態が見えてきます。

■ どんな話をするのか
特別な準備は要りません。いま気になっていることを、
そのまま話していただくだけで大丈夫です。
うまく言葉にならない感じでも構いません。
AIが、お話を聞きながら、一緒に整理していきます。

■ 誰に向いているか
「決められない」「動けない」「何から考えればいいか分からない」
そんな状態にいる方に向いています。
特に、人生の後半に入って、仕事・家族・親・お金・将来などが
同時に気になり始めた方に響きやすい考え方です。
ただ、年代やテーマを問わず、どなたでも使えます。

■ 何が起きるか
3〜5分ほど対話すると、いまのあなたの「天気」が見えます。
天気と一緒に、整理されたこと・気づいたこと・最初の一歩が、
レポートとして残ります。

■ 大切にしている考え方
決められないのは、弱さではなく、構造の問題です。
いくつもの迷いが同時に重なると、人は前に進めなくなる。
お転機診断は、その絡み合いを言葉にして、
判断をあなたの手に戻すための入口です。

【話し方】
- 温かく、明快に、端的に
- 一回の答えは2〜4文程度
- 専門用語は使わない、押しつけない
- 訪問者の質問に対して、必要な答えだけを返す
- 質問されていないことは、こちらから語らない
【発言回数に応じた誘導】
今、訪問者の発言回数は ${turnNumber} 回目です。

- 1〜2回目：誘導なし。サイトの説明や質問への答えに集中する。
- 3〜5回目：応答の最後に、自然な流れで以下のような誘導を一文添える。
  「よろしければ、今のあなたの天気を調べてみることもできます」
  「画面下に、自分の天気を調べるボタンがあります」
  ※毎回ではなく、流れに合うタイミングで。
- 6回目以降：もう少し明確に、優しく促す。
  「だいたいお伝えできたかと思います。今あなたがどんな天気か、調べてみませんか?」
  「お話を聞いていると、診断を始めるとよさそうですね。下のボタンからお進みいただけます」

ただし、訪問者がまだ熱心に質問を続けている場合は、無理に誘導しない。
誘導は会話を切り上げるためではなく、訪問者が次に進める道を示すため。

【最重要・絶対ルール：天気の言葉をチャット内で一切使わない】
チャット会話の応答テキストの中で、
「晴れ」「くもり」「雨」「嵐」という4つの天気の言葉を、絶対に使わない。

- 説明・予告・例示・問いかけ・暗示——いかなる用途でも使わない
- 「○○のような状態ですね」と4つの言葉で語らない
- 「○○か、それとも○○か」と4つの言葉で選択肢を示さない
- 訪問者から「私の天気は晴れ?」と聞かれても、4つの言葉では返さない
- 代わりに「画面下のボタンから、今の天気を見てみることができます」とだけ返す

天気は、訪問者が画面下のボタンを押した後の整理画面でのみ可視化されるもの。
チャット応答の中で4つの単語が出ると、診断体験そのものを壊します。
このルールは、他のどのルールよりも優先されます。

【絶対にしないこと】
- 深い人生相談に乗らない（それは本対話の役割）
- 「お話してみますか?」と誘導しない（ボタンが画面にあります）
- 営業的な売り込みをしない
- 訪問者の悩みを掘り下げない
- 長く話さない

人間の伴走者の役割なので、ここでは無理に踏み込まない。

【あなたの役割】
本人が、自分の状況の絡み合いに気づくのを支える。
答えを与えるのではない。本人が自分の言葉で

本人が短い言葉で言うことの裏には、必ず複数の領域の重なりがある。

例えば「希望退職、辞めたい、でも家庭がある」と聞けば、

状況の重さ・複雑さ・絡み合いを、あなた自身が想像して、

- 解決策を提示しない

function extractThemeClear(t){
  const m=t.match(/###THEME_CLEAR:(sunny|cloudy|rainy|storm)###/);
  return m?m[1]:null;
}
function extractInsightFlag(t){
  const fs=["###INSIGHT_L4###","###INSIGHT_L3###","###INSIGHT_L2###","###INSIGHT_L1###","###INSIGHT_HOLD###"];
  for(const f of fs){if(t.includes(f))return f.replace(/###/g,"").trim();}
  return null;
}
function stripFlags(t){
  return t.replace(/###THEME_CLEAR:(sunny|cloudy|rainy|storm)###/g,"")
          .replace(/###INSIGHT_L[1-4]###/g,"")
          .replace(/###INSIGHT_HOLD###/g,"")
          .replace(/###WEATHER_REPORT###[\s\S]*$/g,"")
          .trim();
}
function parseWeatherReport(text) {
  if (!text.includes("###WEATHER_REPORT###")) return null;
  const lines = text.replace("###WEATHER_REPORT###","").trim().split("\n").filter(l=>l.trim());
  const r = {};
  lines.forEach(line => {
    const t = line.trim();
    const sep = t.indexOf("：");
    if (sep === -1) return;
    const key = t.substring(0, sep).trim();
    const val = t.substring(sep+1).trim();
    const map = {
      "天気":"weather",
      "気づきレベル":"insightLevel",
      "今のあなた":"now",
      "整理できたこと":"organized",
      "重かったもの":"heavy",
      "軽くなったこと":"lighter",
      "本当に大切なこと":"coreValue",
      "判断が止まっていた理由":"reason",
      "見えてきた方向":"direction",
      "手放してよいこと":"release",
      "見えてきたこと":"insight",
      "大切にしていること":"value",
      "最初の一歩":"firstStep"
    };
    if (map[key]) r[map[key]] = val;
  });
  if (!r.weather) r.weather = "cloudy";
  const wMap = {"sunny":"sunny","cloudy":"cloudy","rainy":"rainy","storm":"storm",
                "晴れ":"sunny","くもり":"cloudy","雨":"rainy","嵐":"storm"};
  r.weather = wMap[r.weather.toLowerCase()] || "cloudy";
  r.level = {L1:1,L2:2,L3:3,L4:4}[r.insightLevel] || 1;
  return r;
}

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, loading, insightFlag]);

  const toggleTheme = (t) => setThemes(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev,t]);

  const startChat = async () => {
    setScreen("chat"); setLoading(true);
    const sys = buildPrompt(age, themes);
    const themeStr = themes.slice(0,2).join("・") || "気になっていること";
    const intro = `${age||""}です。${themeStr}について話したいことがあります。`;
    const res = await callClaude([{role:"user", content:intro}], sys);
    const tc = extractThemeClear(res);
    const fl = extractInsightFlag(res);
    setMessages([
      {role:"user", content:intro, hidden:true},
      {role:"assistant", content:stripFlags(res)}
    ]);
    setTurnCount(1);
    if(tc && !entryWeather) setEntryWeather(tc);
    // C案：最初のターンでは気づきカードを出さない（レベルだけ記録）
    if(fl && fl!=="INSIGHT_HOLD"){
      setInsightLevel(lvMap[fl] || 1);
    }
    setLoading(false);
  };

  // 「今の天気を見てみる」を本人が押したとき
  const requestWeather = async () => {
    if (loading) return;
    setInsightFlag(null);
    setLoading(true);
    const sys = buildPrompt(age, themes);
    const apiMsgs = messages.filter(m=>!m.hidden && !m.isReport).map(m=>({role:m.role,content:m.content}));
    const lvStr = insightLevel ? `気づきレベルはL${insightLevel}です。対応するレポート形式で生成してください。` : "";
    const sysF = sys + `\n\n【重要】本人が「今の天気を見てみます」を選びました。今すぐ###WEATHER_REPORT###形式でレポートを生成してください。${lvStr}`;
    const res = await callClaude([...apiMsgs, {role:"user", content:"今の天気を見てみます。"}], sysF);
    const parsed = parseWeatherReport(res);
    if (parsed) {
      setReport(parsed);
      setMessages(prev=>[...prev,
        {role:"user", content:"今の天気を見てみます。", isWeatherRequest:true},
        {role:"assistant", content:res, isReport:true}
      ]);
      setTimeout(()=>setScreen("reveal"), 500);
    } else {
      setMessages(prev=>[...prev, {role:"assistant", content:stripFlags(res)}]);
    }
    setLoading(false);
  };

  const continueChat = () => {
    setSuggestCount(c=>c+1);
    setInsightFlag(null);
  };

  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput("");
    setLoading(true);
    setInsightFlag(null);
    const newMsgs = [...messages, {role:"user", content:userMsg}];
    setMessages(newMsgs);
    const nt = turnCount + 1;
    setTurnCount(nt);
    const apiMsgs = newMsgs.filter(m=>!m.hidden && !m.isReport).map(m=>({role:m.role,content:m.content}));
    const res = await callClaude(apiMsgs, buildPrompt(age, themes, nt));
    const tc = extractThemeClear(res);
    const fl = extractInsightFlag(res);
    const stripped = stripFlags(res);
    const isReportLeak = res.includes("###WEATHER_REPORT###") || stripped === "";
    const finalContent = isReportLeak
      ? "今の天気を見てみたいということですね。\n画面下の「☀️ 今の天気を見てみる」ボタンを押してみてください。"
      : stripped;
    setMessages(prev=>[...prev, {role:"assistant", content:finalContent}]);;
    if(tc && !entryWeather) setEntryWeather(tc);
    // C案：最低3ターン以降に気づきカードを表示
    if(fl && fl!=="INSIGHT_HOLD" && suggestCount<2 && nt>=3){
      setInsightFlag(fl);
      setInsightLevel(lvMap[fl] || 1);
    } else if(fl && fl!=="INSIGHT_HOLD"){
      // レベルだけは記録しておく
      setInsightLevel(lvMap[fl] || 1);
    }
    setLoading(false);
  };

  const reset = () => {
    setScreen("lp"); setAge(null); setThemes([]);
    setMessages([]); setInput(""); setReport(null);
    setInsightFlag(null); setInsightLevel(null);
    setSuggestCount(0); setTurnCount(0); setEntryWeather(null);
  };

  if (screen==="lp")             return <LP onStart={()=>setScreen("step1")} onConcierge={()=>setScreen("concierge")}/>;
  if (screen==="concierge")      return <ConciergeChat onStart={()=>setScreen("step1")} onBack={()=>setScreen("lp")} onTop={reset}/>;
  if (screen==="step1")          return <Step1 age={age} setAge={setAge} onNext={()=>setScreen("step2")} onBack={()=>setScreen("lp")} onTop={reset}/>;
  if (screen==="step2")          return <Step2 themes={themes} toggle={toggleTheme} onNext={startChat} onBack={()=>setScreen("step1")} onTop={reset}/>;
  if (screen==="chat")           return <Chat messages={messages} input={input} setInput={setInput} loading={loading} onSend={send} insightFlag={insightFlag} onWeather={requestWeather} onContinue={continueChat} chatEndRef={chatEndRef} entryWeather={entryWeather} onTop={reset}/>;
  if (screen==="reveal"&&report) return <Reveal report={report} entryWeather={entryWeather} onNext={()=>setScreen("report")} onTop={reset}/>;
  if (screen==="report"&&report) return <Report report={report} entryWeather={entryWeather} onReset={reset} onMore={()=>setScreen("deep_intro")} onTop={reset}/>;
  if (screen==="deep_intro")     return <DeepIntro onBack={()=>setScreen("report")} onTop={reset}/>;
  return null;
}

// CONCIERGE CHAT：サイトについて聞ける入口対話
// ============================================================
function ConciergeChat({ onStart, onBack, onTop }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [askedQuestions, setAskedQuestions] = useState([]);
  const chatEndRef = useRef(null);

  const initialQuestions = [
    "これは何のサイト?",
    "何が起きるの?",
    "自分にも使える?"
  ];

  const followUpQuestions = [
    "どんな話をすればいい?",
    "時間はどれくらいかかる?",
    "どんな人に向いてる?",
    "答えがもらえるの?",
    "無料なの?"
  ];

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  useEffect(() => {
    setMessages([{
      role: "assistant",
      content: "お転機診断にようこそ。\nご質問があれば、何でもどうぞ。"
    }]);
  }, []);

  const handleQuestion = async (question) => {
    if (loading) return;
    setLoading(true);
    setAskedQuestions(prev => [...prev, question]);

    const newMessages = [...messages, { role: "user", content: question }];
    setMessages(newMessages);
    setInput("");

    const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));
    const response = await callConcierge(apiMessages, buildConciergePrompt(askedQuestions.length + 1));

    setMessages(prev => [...prev, { role: "assistant", content: response }]);
    setLoading(false);
  };

  const sendInput = () => {
    if (!input.trim() || loading) return;
    handleQuestion(input.trim());
  };

  const getAvailableQuestions = () => {
    const initialAsked = initialQuestions.filter(q => askedQuestions.includes(q));
    if (initialAsked.length < initialQuestions.length) {
      return initialQuestions.filter(q => !askedQuestions.includes(q));
    } else {
      return followUpQuestions.filter(q => !askedQuestions.includes(q)).slice(0, 3);
    }
  };

  const availableQuestions = getAvailableQuestions();

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", backgroundColor: CREAM, maxWidth: 600, margin: "0 auto", fontFamily: F }}>
      <div style={{ padding: "13px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${WG}`, backgroundColor: "#FDFAF5" }}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: BROWN, fontSize: 13, cursor: "pointer", fontFamily: F }}>← 戻る</button>
        <span style={{ fontSize: 14, fontWeight: 700, color: DARK, letterSpacing: 1, fontFamily: "'Noto Serif JP',serif" }}>サイトについて聞く</span>
        {onTop ? (
          <button onClick={onTop} style={{ background: "none", border: "none", color: BROWN, fontSize: 11, cursor: "pointer", fontFamily: F, opacity: 0.7 }}>TOPに戻る</button>
        ) : (
          <span style={{ fontSize: 11, color: "#8C8070", width: 50 }}>　</span>
        )}
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "18px 14px", display: "flex", flexDirection: "column", gap: 14 }}>
        {messages.map((m, i) => (
          <div key={i} style={m.role === "user" ? { display: "flex", justifyContent: "flex-end" } : { display: "flex", gap: 10, alignItems: "flex-start" }}>
            {m.role === "assistant" && (
              <div style={{ width: 34, height: 34, borderRadius: "50%", background: `linear-gradient(135deg,${GOLD},${GOLD2})`, color: NAVY, fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontFamily: "'Noto Serif JP',serif", boxShadow: "0 2px 8px rgba(201,168,76,0.3)" }}>案</div>
            )}
            <div style={m.role === "user"
              ? { backgroundColor: BROWN, color: "#FFF8F0", borderRadius: "14px 4px 14px 14px", padding: "12px 16px", fontSize: 14, lineHeight: 1.9, maxWidth: "80%", whiteSpace: "pre-wrap" }
              : { backgroundColor: "#FFF8F0", borderRadius: "4px 14px 14px 14px", padding: "12px 16px", fontSize: 14, color: DARK, lineHeight: 1.9, maxWidth: "82%", boxShadow: "0 2px 10px rgba(0,0,0,0.07)", whiteSpace: "pre-wrap" }}>
              {m.content}
            </div>
          </div>
        ))}

        {loading && (
          <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
            <div style={{ width: 34, height: 34, borderRadius: "50%", background: `linear-gradient(135deg,${GOLD},${GOLD2})`, color: NAVY, fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Noto Serif JP',serif" }}>案</div>
            <div style={{ backgroundColor: "#FFF8F0", borderRadius: "4px 14px 14px 14px", padding: "14px 18px", display: "flex", gap: 6, alignItems: "center", boxShadow: "0 2px 10px rgba(0,0,0,0.07)" }}>
              {[0, 1, 2].map(i => <div key={i} style={{ width: 7, height: 7, borderRadius: "50%", backgroundColor: GOLD, animation: "pulse 1.2s ease-in-out infinite", animationDelay: `${i * 0.2}s` }} />)}
            </div>
          </div>
        )}

        {!loading && availableQuestions.length > 0 && (
          <div style={{ marginLeft: 44, marginTop: 4, display: "flex", flexDirection: "column", gap: 8 }}>
            <p style={{ fontSize: 11, color: "#8C8070", marginBottom: 4 }}>
              {askedQuestions.length === 0 ? "こんなことが聞けます" : "こんなことも聞けます"}
            </p>
            {availableQuestions.map((q, idx) => (
              <button key={idx} onClick={() => handleQuestion(q)} style={{
                backgroundColor: "transparent",
                border: `1px solid ${WG}`,
                color: DARK,
                borderRadius: 18,
                padding: "9px 16px",
                fontSize: 13,
                cursor: "pointer",
                fontFamily: F,
                textAlign: "left",
                width: "fit-content"
              }}>
                {q}
              </button>
            ))}
          </div>
        )}

        <div ref={chatEndRef} />
      </div>

      <div style={{ padding: "16px 14px 12px", borderTop: `1px solid ${WG}`, backgroundColor: "#FDFAF5" }}>
      <div style={{ display: "flex", gap: 8, alignItems: "flex-end", marginBottom: 12 }}>
          <textarea
            style={{ flex: 1, border: `1px solid ${WG}`, borderRadius: 10, padding: "10px 13px", fontSize: 13, color: DARK, backgroundColor: "#FFF8F0", resize: "none", outline: "none", lineHeight: 1.7, fontFamily: F }}
            value={input}
            onChange={e => setInput(e.target.value)}
            placeholder="自分で質問を書く"
            rows={1}
            onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendInput(); } }}
          />
          <button
            style={{ backgroundColor: BROWN, color: "#FFF8F0", border: "none", borderRadius: 10, padding: "10px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: F, opacity: input.trim() && !loading ? 1 : 0.35 }}
            onClick={sendInput}
            disabled={!input.trim() || loading}
          >
            送る
          </button>
        </div>

        <button onClick={onStart} style={{
          ...BB,
          width: "100%"
        }}>
          今の天気を調べてみる　›
        </button>
      </div>  </div>
  );
}

          <div key={i} style={m.role==="user"?{display:"flex",justifyContent:"flex-end"}:{display:"flex",gap:10,alignItems:"flex-start"}}>
            {m.role==="assistant"&&(
              <div style={{width:34,height:34,borderRadius:"50%",background:`linear-gradient(135deg,${GOLD},${GOLD2})`,color:NAVY,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"'Noto Serif JP',serif",boxShadow:"0 2px 8px rgba(201,168,76,0.3)"}}>転</div>
            )}
            <div style={m.role==="user"
              ?{backgroundColor:BROWN,color:"#FFF8F0",borderRadius:"14px 4px 14px 14px",padding:"12px 16px",fontSize:14,lineHeight:1.9,maxWidth:"80%",whiteSpace:"pre-wrap"}
              :{backgroundColor:"#FFF8F0",borderRadius:"4px 14px 14px 14px",padding:"12px 16px",fontSize:14,color:DARK,lineHeight:1.9,maxWidth:"82%",boxShadow:"0 2px 10px rgba(0,0,0,0.07)",whiteSpace:"pre-wrap"}}>
              {m.content}
            </div>
          </div>
        ))}

        {loading&&(
          <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
            <div style={{width:34,height:34,borderRadius:"50%",background:`linear-gradient(135deg,${GOLD},${GOLD2})`,color:NAVY,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Serif JP',serif"}}>転</div>
            <div style={{backgroundColor:"#FFF8F0",borderRadius:"4px 14px 14px 14px",padding:"14px 18px",display:"flex",gap:6,alignItems:"center",boxShadow:"0 2px 10px rgba(0,0,0,0.07)"}}>
              {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",backgroundColor:GOLD,animation:"pulse 1.2s ease-in-out infinite",animationDelay:`${i*0.2}s`}}/>)}
            </div>
          </div>
        )}

        {/* B案：緑カード廃止。気づきはAIの会話の中で自然に表現される */}
        <div ref={chatEndRef}/>
      </div>

      <div style={{padding:"11px 14px",borderTop:`1px solid ${WG}`,backgroundColor:"#FDFAF5"}}>
        {/* B案：常に2つのボタンを並べる */}
        <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:10}}>
          <button onClick={onWeather} disabled={loading} style={{backgroundColor:"transparent",border:`1px solid ${GOLD}`,color:GOLD,borderRadius:20,padding:"6px 18px",fontSize:12,cursor:"pointer",fontFamily:F,opacity:loading?0.4:1}}>
            ☀️ 今の天気を見てみる
          </button>
          <button onClick={onContinue} disabled={loading} style={{backgroundColor:"transparent",border:`1px solid ${WG}`,color:"#8C8070",borderRadius:20,padding:"6px 18px",fontSize:12,cursor:"pointer",fontFamily:F,opacity:loading?0.4:1}}>
            もう少し話す
          </button>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <textarea
            style={{flex:1,border:`1px solid ${WG}`,borderRadius:10,padding:"10px 13px",fontSize:14,color:DARK,backgroundColor:"#FFF8F0",resize:"none",outline:"none",lineHeight:1.7,fontFamily:F}}
            value={input} onChange={e=>setInput(e.target.value)}
            placeholder="感じていることを、そのまま話してみてください" rows={2}
            onKeyDown={e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); onSend(); } }}
          />
          <button style={{backgroundColor:BROWN,color:"#FFF8F0",border:"none",borderRadius:10,padding:"10px 18px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:F,opacity:input.trim()&&!loading?1:0.35}} onClick={onSend} disabled={!input.trim()||loading}>送る</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// REVEAL：Before/After天気表示
// ============================================================
function Reveal({ report, entryWeather, onNext, onTop }) {
  const w = WEATHER[report.weather] || WEATHER.cloudy;
  const ew = entryWeather ? WEATHER[entryWeather] : null;
  const changed = ew && entryWeather !== report.weather;
  const changeMsg = changed ? getChangeType(entryWeather, report.weather) : null;
  const [show, setShow] = useState(false);
  const [showChange, setShowChange] = useState(false);

  useEffect(()=>{
    const t1 = setTimeout(()=>setShow(true), 300);
    const t2 = setTimeout(()=>setShowChange(true), 1600);
    return ()=>{clearTimeout(t1); clearTimeout(t2);};
  },[]);

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",backgroundColor:w.bg,fontFamily:F}}>
      <div style={{textAlign:"center",padding:"48px 28px",maxWidth:400,width:"100%"}}>
        <p style={{fontSize:12,color:w.accent,letterSpacing:3,marginBottom:24}}>今のあなたの心の天気</p>

        {changed && ew ? (
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginBottom:20,opacity:show?1:0,transition:"opacity 0.5s ease 0.3s"}}>
            <div style={{textAlign:"center",opacity:0.5}}>
              <div style={{fontSize:32}}>{ew.emoji}</div>
              <div style={{fontSize:10,color:ew.accent,marginTop:2}}>{ew.label}</div>
              <div style={{fontSize:9,color:"#8C8070",marginTop:1}}>話す前</div>
            </div>
            <div style={{fontSize:20,color:"#8C8070"}}>→</div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:64,animation:show?"scaleIn 0.6s ease 0.5s both":"none"}}>{w.emoji}</div>
              <div style={{fontSize:16,fontWeight:700,color:w.accent,marginTop:4,fontFamily:"'Noto Serif JP',serif"}}>{w.label}</div>
              <div style={{fontSize:9,color:"#8C8070",marginTop:1}}>話した後</div>
            </div>
          </div>
        ) : (
          <div style={{fontSize:96,lineHeight:1,marginBottom:24,opacity:show?1:0,transform:show?"scale(1)":"scale(0.2)",transition:"all 0.9s cubic-bezier(0.34,1.56,0.64,1)"}}>{w.emoji}</div>
        )}

        <div style={{opacity:show?1:0,transform:show?"translateY(0)":"translateY(20px)",transition:"all 0.6s ease 0.6s"}}>
          {!changed && <h2 style={{fontSize:36,fontWeight:700,color:w.accent,letterSpacing:2,marginBottom:12,fontFamily:"'Noto Serif JP',serif"}}>{w.label}</h2>}
          <p style={{fontSize:14,fontWeight:600,color:w.accent,marginBottom:12,lineHeight:1.7}}>{w.headline}</p>

          {changeMsg && showChange && (
            <div style={{animation:"slideUp 0.6s ease",backgroundColor:"rgba(0,0,0,0.04)",borderRadius:12,padding:"12px 16px",marginBottom:14}}>
              <p style={{fontSize:12,color:w.accent,lineHeight:1.8,margin:0}}>{changeMsg}</p>
            </div>
          )}

          <p style={{fontSize:13,color:"#5C5040",lineHeight:1.9,marginBottom:16}}>{w.body}</p>
          <p style={{fontSize:11,color:w.accent,lineHeight:1.8,marginBottom:28,padding:"10px 16px",backgroundColor:"rgba(0,0,0,0.04)",borderRadius:10}}>{w.note}</p>
        </div>
        <button onClick={onNext} style={{backgroundColor:w.accent,color:"#FFF8F0",border:"none",borderRadius:30,padding:"14px 36px",fontSize:14,cursor:"pointer",letterSpacing:1,fontFamily:F,boxShadow:"0 4px 16px rgba(0,0,0,0.15)",opacity:show?1:0,transition:"opacity 0.5s ease 1.2s"}}>
          今の整理を見る　›
        </button>
        {onTop && <div style={{marginTop:20,opacity:show?0.7:0,transition:"opacity 0.5s ease 1.4s"}}>
          <button onClick={onTop} style={{background:"none",border:"none",color:w.accent,fontSize:12,cursor:"pointer",fontFamily:F,textDecoration:"underline"}}>TOPに戻る</button>
        </div>}
      </div>
    </div>
  );
}

    <div style={{minHeight:"100vh",backgroundColor:"#2A3828",padding:"32px 16px 56px",fontFamily:F}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        {changed && ew ? (
          <div style={{display:"inline-flex",alignItems:"center",gap:10,borderRadius:20,padding:"10px 20px",backgroundColor:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",marginBottom:12}}>

              <div style={{fontSize:20,opacity:0.6}}>{ew.emoji}</div>

              <div style={{fontSize:28}}>{w.emoji}</div>
              <div style={{fontSize:11,fontWeight:700,color:w.accent,marginTop:2}}>{w.label}</div>

            {improved && <span style={{fontSize:10,color:LGREEN,backgroundColor:"rgba(168,197,160,0.15)",borderRadius:10,padding:"3px 8px"}}>前進</span>}

      </div>

      <div style={{maxWidth:460,margin:"0 auto",display:"flex",flexDirection:"column",gap:12}}>

            ここで見えた天気は、あなたの中にあったもの。<br/>

            <span style={{fontSize:11,opacity:0.8}}>あなたのペースで、いつでも。</span>

        {/* LIVE-As 説明セクション */}

          </h3>
          <p style={{fontSize:12,color:"rgba(245,240,232,0.85)",lineHeight:1.95,marginBottom:18}}>

          ].map(item=>(
            <div key={item.num} style={{display:"flex",gap:12,marginBottom:14}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${GOLD},${GOLD2})`,color:NAVY,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{item.num}</div>
              <div>

            </p>
          </div>

          <p style={{fontSize:10,color:"rgba(245,240,232,0.5)",lineHeight:1.7,margin:"12px 0 0",textAlign:"center"}}>
            LIVE-As 本体は現在準備中です

        </div>

        <button onClick={onMore} style={{backgroundColor:GREEN,color:"#FFF8F0",border:"none",borderRadius:24,padding:"13px 24px",fontSize:13,cursor:"pointer",fontFamily:F,width:"100%",marginBottom:12}}>
          もう少し深く整理する

        <button onClick={onReset} style={{backgroundColor:"transparent",border:`1px solid rgba(168,197,160,0.4)`,color:LGREEN,borderRadius:30,padding:"11px 32px",fontSize:13,cursor:"pointer",fontFamily:F}}>
          TOPに戻る
        </button>
      </div>
    </div>
  );
}

function RC({ label, color, content }) {

    <div style={{backgroundColor:"rgba(255,255,255,0.06)",borderRadius:14,padding:"14px 18px",border:"1px solid rgba(255,255,255,0.08)"}}>

      <p style={{fontSize:13,color:"#E8EDE6",lineHeight:1.9,margin:0}}>{content}</p>
    </div>
  );
}
