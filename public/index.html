async function callClaude(messages,systemPrompt){
  try{
    const res=await fetch('https://liveas.vercel.app/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:systemPrompt,messages})});
    const data=await res.json();
    return data.content?.[0]?.text||'申し訳ありません。もう一度お試しください。';
  }catch{return '接続エラーが発生しました。もう一度お試しください。';}
}

自分の状況を理解し、自分で決断していく過程を支えること。

答えを与えるのではない。
本人が「自分の中にあった」と気づける体験を支える。

【会話の進め方】
あなたは優秀な対話AIです。中核理念から外れない範囲で、
あなた自身の判断で、自然に温かく対話してください。

大切にしてほしいこと：
- 相談者に寄り添い、深める問いかけを行う
- まず受け止める（「そうなんですね」「それは大変ですね」など、自然な共感の言葉）
- 相談者の言葉を「」付きで返しながら、一段階だけ深く映し返す
- 相談者のペースを尊重する
- 本音を引き出すように、深く聴く

返答の長さ：
短すぎず長すぎず、内容にふさわしい長さで。
共感→言葉を返す→深い問いかけ、という流れを自然に。
機械的に「2〜3文」と縛らない。状況に応じて調整してください。

例：
本人「最近、家族のことで悩んでいて」
返し例：
「そうなんですね。家族のことで悩んでいる、と。
それは、心の中に重く残っていそうですね。
よかったら、もう少し聞かせてもらえますか。
何が一番気になっているんでしょうか。」

本人「なんとなく不安で」
返し例：
「『なんとなく』というのが、正直なところなんですね。
まだ言葉にならない、でも確かにそこにある感じでしょうか。
その不安は、最近強くなってきた感じですか。それとも、ずっとあったものですか。」

【天気を提案するタイミング】
あなたの判断に任せます。

相談者の中で何かの方向性が見え始めた瞬間
（モヤモヤの輪郭が見え始めた、状況が可視化された、
本音に触れた、自分の役割に気づいた、大切なものが見えた、
自分の言葉で話せるようになった、など）には、
本人の言葉を返しながら、その都度自然に提案してください：

「『○○』と、出てきましたね。
このまま、もう少し話しますか。
それとも、今の状態を天気として見てみますか。」

何度提案してもよいですが、押しつけない。
相談者が「もう少し話す」を選んだら、その意思を尊重して、
また深く聴く側に回ってください。
そして、新たに方向性が見えてきたら、また自然に提案する。

人それぞれ、気づきのペースは違います。
浅いところで満足する人もいれば、深く掘りたい人もいる。
どちらも正しい。本人のペースを尊重してください。

【テーマ確定フラグ】
2ターン目以降、話の内容が見えてきたら、返答末尾に単独1行で：
###THEME_CLEAR:[sunny/cloudy/rainy/storm]###

天気判定：
sunny=方向性が見えている
cloudy=モヤモヤ重なり
rainy=複数課題絡み合い損失感強い
storm=判断不能全体に広がる

【相談者が「今の天気を見てみます」と言った時】
返答末尾に必ず以下の形式で天気レポートを生成してください。
状況に応じて、必須項目に加えて、ふさわしいオプション項目を選んで盛り込んでください。

###WEATHER_REPORT###
天気：[sunny/cloudy/rainy/storm]
今のあなた：[相談者の言葉を使って今の状態を2〜3文]
見えてきたこと：[相談者が気づいたことを1〜2文]
大切にしていること：[相談者が守りたいものを1文]
最初の一歩：[相談者の言葉から生まれた今週できる小さな行動を1つ]

【オプション項目（状況に応じて追加）】
状況が整理されたとき：
整理できたこと：[何が重なっていたかを1文]

感情が動いたとき：
重かったもの：[何が重くのしかかっていたかを1文]
軽くなったこと：[話すことで何が変わったかを1文]

本質に触れたとき：
本当に大切なこと：[守りたい核心を1文]
判断が止まっていた理由：[弱さではなく構造として1文]

方向が見えたとき：
見えてきた方向：[これからどう生きたいかを1文]
手放してよいこと：[今すぐ決めなくていいことを1つ]

【出力ルール】
- 必須項目（今のあなた、見えてきたこと、大切にしていること、最初の一歩）は必ず入れる
- オプション項目から、相談者の状況にふさわしい1〜3項目を選んで追加
- 全部入れる必要はない。本人の話の流れに合うものだけ
- 各項目は本人の言葉を使う

【絶対にしないこと】
- 答えを与えない
- 解決策を提示しない
- 専門機関を紹介しない
- 「すべきです」「した方がいい」と言わない
- 「寄り添います」「整理していきます」と宣言しない
- 商品やサービスへの誘導をしない
- 何度も天気を急かさない
- 相談者より先に結論を出さない`;
}

// ============================================================
// フラグ抽出関数
// ============================================================
function extractThemeClear(t){
  const m=t.match(/###THEME_CLEAR:(sunny|cloudy|rainy|storm)###/);
  return m?m[1]:null;
}
function extractInsightFlag(t){
  const fs=["###INSIGHT_L4###","###INSIGHT_L3###","###INSIGHT_L2###","###INSIGHT_L1###","###INSIGHT_HOLD###"];
  for(const f of fs){if(t.includes(f))return f.replace(/###/g,"").trim();}
  return null;
}
function stripFlags(t){
  return t.replace(/###THEME_CLEAR:(sunny|cloudy|rainy|storm)###/g,"")
          .replace(/###INSIGHT_L[1-4]###/g,"")
          .replace(/###INSIGHT_HOLD###/g,"")
          .trim();
}
function parseWeatherReport(text) {
  if (!text.includes("###WEATHER_REPORT###")) return null;
  const lines = text.replace("###WEATHER_REPORT###","").trim().split("\n").filter(l=>l.trim());
  const r = {};
  lines.forEach(line => {
    const t = line.trim();
    const sep = t.indexOf("：");
    if (sep === -1) return;
    const key = t.substring(0, sep).trim();
    const val = t.substring(sep+1).trim();
    const map = {
      "天気":"weather",
      "気づきレベル":"insightLevel",
      "今のあなた":"now",
      "整理できたこと":"organized",
      "重かったもの":"heavy",
      "軽くなったこと":"lighter",
      "本当に大切なこと":"coreValue",
      "判断が止まっていた理由":"reason",
      "見えてきた方向":"direction",
      "手放してよいこと":"release",
      "見えてきたこと":"insight",
      "大切にしていること":"value",
      "最初の一歩":"firstStep"
    };
    if (map[key]) r[map[key]] = val;
  });
  if (!r.weather) r.weather = "cloudy";
  const wMap = {"sunny":"sunny","cloudy":"cloudy","rainy":"rainy","storm":"storm",
                "晴れ":"sunny","くもり":"cloudy","雨":"rainy","嵐":"storm"};
  r.weather = wMap[r.weather.toLowerCase()] || "cloudy";
  r.level = {L1:1,L2:2,L3:3,L4:4}[r.insightLevel] || 1;
  return r;
}
function getWeatherLevel(w){return {sunny:3,cloudy:2,rainy:1,storm:0}[w]??2;}
function getChangeType(b,a){if(!b||b===a)return null;return CHANGE_MESSAGES[`${b}→${a}`]||null;}

// MAIN APP
// ============================================================
function App() {
  const [screen,        setScreen]        = useState("lp");
  const [age,           setAge]           = useState(null);
  const [themes,        setThemes]        = useState([]);
  const [messages,      setMessages]      = useState([]);
  const [input,         setInput]         = useState("");
  const [loading,       setLoading]       = useState(false);
  const [report,        setReport]        = useState(null);
  const [insightFlag,   setInsightFlag]   = useState(null);
  const [insightLevel,  setInsightLevel]  = useState(null);
  const [suggestCount,  setSuggestCount]  = useState(0);
  const [turnCount,     setTurnCount]     = useState(0);
  const [entryWeather,  setEntryWeather]  = useState(null);
  const chatEndRef = useRef(null);

  const lvMap = {INSIGHT_L1:1,INSIGHT_L2:2,INSIGHT_L3:3,INSIGHT_L4:4};

  useEffect(()=>{
    const st = document.createElement("style");
    st.textContent = `
      @keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}
      @keyframes scaleIn{from{opacity:0;transform:scale(0.3)}to{opacity:1;transform:scale(1)}}
      @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
      @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    `;
    document.head.appendChild(st);
    return () => { try { document.head.removeChild(st); } catch {} };
  }, []);

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, loading, insightFlag]);

  const toggleTheme = (t) => setThemes(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev,t]);

  const startChat = async () => {
    setScreen("chat"); setLoading(true);
    const sys = buildPrompt(age, themes);
    const themeStr = themes.slice(0,2).join("・") || "気になっていること";
    const intro = `${age||""}です。${themeStr}について話したいことがあります。`;
    const res = await callClaude([{role:"user", content:intro}], sys);
    const tc = extractThemeClear(res);
    const fl = extractInsightFlag(res);
    setMessages([
      {role:"user", content:intro, hidden:true},
      {role:"assistant", content:stripFlags(res)}
    ]);
    setTurnCount(1);
    if(tc && !entryWeather) setEntryWeather(tc);
    // C案：最初のターンでは気づきカードを出さない（レベルだけ記録）
    if(fl && fl!=="INSIGHT_HOLD"){
      setInsightLevel(lvMap[fl] || 1);
    }
    setLoading(false);
  };

  // 「今の天気を見てみる」を本人が押したとき
  const requestWeather = async () => {
    if (loading) return;
    setInsightFlag(null);
    setLoading(true);
    const sys = buildPrompt(age, themes);
    const apiMsgs = messages.filter(m=>!m.hidden && !m.isReport).map(m=>({role:m.role,content:m.content}));
    const lvStr = insightLevel ? `気づきレベルはL${insightLevel}です。対応するレポート形式で生成してください。` : "";
    const sysF = sys + `\n\n【重要】本人が「今の天気を見てみます」を選びました。今すぐ###WEATHER_REPORT###形式でレポートを生成してください。${lvStr}`;
    const res = await callClaude([...apiMsgs, {role:"user", content:"今の天気を見てみます。"}], sysF);
    const parsed = parseWeatherReport(res);
    if (parsed) {
      setReport(parsed);
      setMessages(prev=>[...prev,
        {role:"user", content:"今の天気を見てみます。", isWeatherRequest:true},
        {role:"assistant", content:res, isReport:true}
      ]);
      setTimeout(()=>setScreen("reveal"), 500);
    } else {
      setMessages(prev=>[...prev, {role:"assistant", content:stripFlags(res)}]);
    }
    setLoading(false);
  };

  const continueChat = () => {
    setSuggestCount(c=>c+1);
    setInsightFlag(null);
  };

  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput("");
    setLoading(true);
    setInsightFlag(null);
    const newMsgs = [...messages, {role:"user", content:userMsg}];
    setMessages(newMsgs);
    const nt = turnCount + 1;
    setTurnCount(nt);
    const apiMsgs = newMsgs.filter(m=>!m.hidden && !m.isReport).map(m=>({role:m.role,content:m.content}));
    const res = await callClaude(apiMsgs, buildPrompt(age, themes));
    const tc = extractThemeClear(res);
    const fl = extractInsightFlag(res);
    setMessages(prev=>[...prev, {role:"assistant", content:stripFlags(res)}]);
    if(tc && !entryWeather) setEntryWeather(tc);
    // C案：最低3ターン以降に気づきカードを表示
    if(fl && fl!=="INSIGHT_HOLD" && suggestCount<2 && nt>=3){
      setInsightFlag(fl);
      setInsightLevel(lvMap[fl] || 1);
    } else if(fl && fl!=="INSIGHT_HOLD"){
      // レベルだけは記録しておく
      setInsightLevel(lvMap[fl] || 1);
    }
    setLoading(false);
  };

  const reset = () => {
    setScreen("lp"); setAge(null); setThemes([]);
    setMessages([]); setInput(""); setReport(null);
    setInsightFlag(null); setInsightLevel(null);
    setSuggestCount(0); setTurnCount(0); setEntryWeather(null);
  };

  if (screen==="lp")             return <LP onStart={()=>setScreen("step1")}/>;
  if (screen==="step1")          return <Step1 age={age} setAge={setAge} onNext={()=>setScreen("step2")} onBack={()=>setScreen("lp")}/>;
  if (screen==="step2")          return <Step2 themes={themes} toggle={toggleTheme} onNext={startChat} onBack={()=>setScreen("step1")}/>;
  if (screen==="chat")           return <Chat messages={messages} input={input} setInput={setInput} loading={loading} onSend={send} insightFlag={insightFlag} onWeather={requestWeather} onContinue={continueChat} chatEndRef={chatEndRef} entryWeather={entryWeather}/>;
  if (screen==="reveal"&&report) return <Reveal report={report} entryWeather={entryWeather} onNext={()=>setScreen("report")}/>;
  if (screen==="report"&&report) return <Report report={report} entryWeather={entryWeather} onReset={reset} onMore={()=>setScreen("deep_intro")}/>;
  if (screen==="deep_intro")     return <DeepIntro onBack={()=>setScreen("report")}/>;
  return null;
}

function Chat({ messages, input, setInput, loading, onSend, insightFlag, onWeather, onContinue, chatEndRef, entryWeather }) {
  const visible = messages.filter(m=>!m.hidden && !m.isReport && !m.isWeatherRequest);
  const insightMsg = insightFlag ? INSIGHT_MESSAGES[insightFlag] : null;
  const ew = entryWeather ? WEATHER[entryWeather] : null;

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",backgroundColor:CREAM,maxWidth:600,margin:"0 auto",fontFamily:F}}>
      <div style={{padding:"13px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${WG}`,backgroundColor:"#FDFAF5"}}>
        <span style={{fontSize:14,fontWeight:700,color:DARK,letterSpacing:1,fontFamily:"'Noto Serif JP',serif"}}>お転機診断</span>
        {ew ? (
          <div style={{display:"flex",alignItems:"center",gap:5,animation:"fadeIn 0.8s ease"}}>
            <span style={{fontSize:10,color:"#8C8070"}}>話す前：</span>
            <span style={{fontSize:15}}>{ew.emoji}</span>
            <span style={{fontSize:10,color:ew.accent,fontWeight:600}}>{ew.label}</span>
          </div>
        ) : (
          <span style={{fontSize:11,color:"#8C8070"}}>LIVE-As</span>
        )}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"18px 14px",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",justifyContent:"center"}}>
          <div style={{backgroundColor:"#EEE9DF",borderRadius:12,padding:"14px 18px",fontSize:13,color:"#6B6055",lineHeight:1.9,textAlign:"center",maxWidth:"92%"}}>
            思い浮かんだことを、そのまま話してみてください。
          </div>
        </div>

        {visible.map((m,i)=>(
          <div key={i} style={m.role==="user"?{display:"flex",justifyContent:"flex-end"}:{display:"flex",gap:10,alignItems:"flex-start"}}>
            {m.role==="assistant"&&(
              <div style={{width:34,height:34,borderRadius:"50%",background:`linear-gradient(135deg,${GOLD},${GOLD2})`,color:NAVY,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"'Noto Serif JP',serif",boxShadow:"0 2px 8px rgba(201,168,76,0.3)"}}>転</div>
            )}
            <div style={m.role==="user"
              ?{backgroundColor:BROWN,color:"#FFF8F0",borderRadius:"14px 4px 14px 14px",padding:"12px 16px",fontSize:14,lineHeight:1.9,maxWidth:"80%",whiteSpace:"pre-wrap"}
              :{backgroundColor:"#FFF8F0",borderRadius:"4px 14px 14px 14px",padding:"12px 16px",fontSize:14,color:DARK,lineHeight:1.9,maxWidth:"82%",boxShadow:"0 2px 10px rgba(0,0,0,0.07)",whiteSpace:"pre-wrap"}}>
              {m.content}
            </div>
          </div>
        ))}

        {loading&&(
          <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
            <div style={{width:34,height:34,borderRadius:"50%",background:`linear-gradient(135deg,${GOLD},${GOLD2})`,color:NAVY,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Serif JP',serif"}}>転</div>
            <div style={{backgroundColor:"#FFF8F0",borderRadius:"4px 14px 14px 14px",padding:"14px 18px",display:"flex",gap:6,alignItems:"center",boxShadow:"0 2px 10px rgba(0,0,0,0.07)"}}>
              {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",backgroundColor:GOLD,animation:"pulse 1.2s ease-in-out infinite",animationDelay:`${i*0.2}s`}}/>)}
            </div>
          </div>
        )}

        {/* B案：緑カード廃止。気づきはAIの会話の中で自然に表現される */}
        <div ref={chatEndRef}/>
      </div>

      <div style={{padding:"11px 14px",borderTop:`1px solid ${WG}`,backgroundColor:"#FDFAF5"}}>
        {/* B案：常に2つのボタンを並べる */}
        <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:10}}>
          <button onClick={onWeather} disabled={loading} style={{backgroundColor:"transparent",border:`1px solid ${GOLD}`,color:GOLD,borderRadius:20,padding:"6px 18px",fontSize:12,cursor:"pointer",fontFamily:F,opacity:loading?0.4:1}}>
            ☀️ 今の天気を見てみる
          </button>
          <button onClick={onContinue} disabled={loading} style={{backgroundColor:"transparent",border:`1px solid ${WG}`,color:"#8C8070",borderRadius:20,padding:"6px 18px",fontSize:12,cursor:"pointer",fontFamily:F,opacity:loading?0.4:1}}>
            もう少し話す
          </button>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <textarea
            style={{flex:1,border:`1px solid ${WG}`,borderRadius:10,padding:"10px 13px",fontSize:14,color:DARK,backgroundColor:"#FFF8F0",resize:"none",outline:"none",lineHeight:1.7,fontFamily:F}}
            value={input} onChange={e=>setInput(e.target.value)}
            placeholder="感じていることを、そのまま話してみてください" rows={2}
            onKeyDown={e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); onSend(); } }}
          />
          <button style={{backgroundColor:BROWN,color:"#FFF8F0",border:"none",borderRadius:10,padding:"10px 18px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:F,opacity:input.trim()&&!loading?1:0.35}} onClick={onSend} disabled={!input.trim()||loading}>送る</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// REVEAL：Before/After天気表示
// ============================================================
function Reveal({ report, entryWeather, onNext }) {
  const w = WEATHER[report.weather] || WEATHER.cloudy;
  const ew = entryWeather ? WEATHER[entryWeather] : null;
  const changed = ew && entryWeather !== report.weather;
  const changeMsg = changed ? getChangeType(entryWeather, report.weather) : null;
  const [show, setShow] = useState(false);
  const [showChange, setShowChange] = useState(false);

  useEffect(()=>{
    const t1 = setTimeout(()=>setShow(true), 300);
    const t2 = setTimeout(()=>setShowChange(true), 1600);
    return ()=>{clearTimeout(t1); clearTimeout(t2);};
  },[]);

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",backgroundColor:w.bg,fontFamily:F}}>
      <div style={{textAlign:"center",padding:"48px 28px",maxWidth:400,width:"100%"}}>
        <p style={{fontSize:12,color:w.accent,letterSpacing:3,marginBottom:24}}>今のあなたの心の天気</p>

        {changed && ew ? (
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginBottom:20,opacity:show?1:0,transition:"opacity 0.5s ease 0.3s"}}>
            <div style={{textAlign:"center",opacity:0.5}}>
              <div style={{fontSize:32}}>{ew.emoji}</div>
              <div style={{fontSize:10,color:ew.accent,marginTop:2}}>{ew.label}</div>
              <div style={{fontSize:9,color:"#8C8070",marginTop:1}}>話す前</div>
            </div>
            <div style={{fontSize:20,color:"#8C8070"}}>→</div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:64,animation:show?"scaleIn 0.6s ease 0.5s both":"none"}}>{w.emoji}</div>
              <div style={{fontSize:16,fontWeight:700,color:w.accent,marginTop:4,fontFamily:"'Noto Serif JP',serif"}}>{w.label}</div>
              <div style={{fontSize:9,color:"#8C8070",marginTop:1}}>話した後</div>
            </div>
          </div>
        ) : (
          <div style={{fontSize:96,lineHeight:1,marginBottom:24,opacity:show?1:0,transform:show?"scale(1)":"scale(0.2)",transition:"all 0.9s cubic-bezier(0.34,1.56,0.64,1)"}}>{w.emoji}</div>
        )}

        <div style={{opacity:show?1:0,transform:show?"translateY(0)":"translateY(20px)",transition:"all 0.6s ease 0.6s"}}>
          {!changed && <h2 style={{fontSize:36,fontWeight:700,color:w.accent,letterSpacing:2,marginBottom:12,fontFamily:"'Noto Serif JP',serif"}}>{w.label}</h2>}
          <p style={{fontSize:14,fontWeight:600,color:w.accent,marginBottom:12,lineHeight:1.7}}>{w.headline}</p>

          {changeMsg && showChange && (
            <div style={{animation:"slideUp 0.6s ease",backgroundColor:"rgba(0,0,0,0.04)",borderRadius:12,padding:"12px 16px",marginBottom:14}}>
              <p style={{fontSize:12,color:w.accent,lineHeight:1.8,margin:0}}>{changeMsg}</p>
            </div>
          )}

          <p style={{fontSize:13,color:"#5C5040",lineHeight:1.9,marginBottom:16}}>{w.body}</p>
          <p style={{fontSize:11,color:w.accent,lineHeight:1.8,marginBottom:28,padding:"10px 16px",backgroundColor:"rgba(0,0,0,0.04)",borderRadius:10}}>{w.note}</p>
        </div>
        <button onClick={onNext} style={{backgroundColor:w.accent,color:"#FFF8F0",border:"none",borderRadius:30,padding:"14px 36px",fontSize:14,cursor:"pointer",letterSpacing:1,fontFamily:F,boxShadow:"0 4px 16px rgba(0,0,0,0.15)",opacity:show?1:0,transition:"opacity 0.5s ease 1.2s"}}>
          今の整理を見る　›
        </button>
      </div>
    </div>
  );
}

// ============================================================
// REPORT：気づきレベル別レポート＋Before/Afterサマリー
// ============================================================
function Report({ report, entryWeather, onReset, onMore }) {
  const w = WEATHER[report.weather] || WEATHER.cloudy;
  const ew = entryWeather ? WEATHER[entryWeather] : null;
  const changed = ew && entryWeather !== report.weather;
  const changeMsg = changed ? getChangeType(entryWeather, report.weather) : null;
  const improved = changed && getWeatherLevel(report.weather) > getWeatherLevel(entryWeather);

  // 全項目の定義（順序通り、データがあるものだけ表示）
  const sections = [
    { key:"now",        label:"今のあなた",         color:LGREEN },
    { key:"organized",  label:"整理できたこと",     color:"#C5A96A" },
    { key:"heavy",      label:"重かったもの",       color:"#C5A96A" },
    { key:"lighter",    label:"軽くなったこと",     color:"#A8C5D0" },
    { key:"insight",    label:"見えてきたこと",     color:"#C5A96A" },
    { key:"value",      label:"大切にしていること", color:"#A8C5D0" },
    { key:"coreValue",  label:"本当に大切なこと",   color:"#E8C96A" },
    { key:"reason",     label:"判断が止まっていた理由", color:"#C5A96A" },
    { key:"direction",  label:"見えてきた方向",     color:"#E8C96A" },
    { key:"release",    label:"手放してよいこと",   color:"#8E8E8E" },
  ];

  return (
    <div style={{minHeight:"100vh",backgroundColor:"#2A3828",padding:"32px 16px 56px",fontFamily:F}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        {changed && ew ? (
          <div style={{display:"inline-flex",alignItems:"center",gap:10,borderRadius:20,padding:"10px 20px",backgroundColor:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",marginBottom:12}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:20,opacity:0.6}}>{ew.emoji}</div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginTop:2}}>{ew.label}</div>
            </div>
            <div style={{fontSize:14,color:"rgba(255,255,255,0.4)"}}>→</div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:28}}>{w.emoji}</div>
              <div style={{fontSize:11,fontWeight:700,color:w.accent,marginTop:2}}>{w.label}</div>
            </div>
            {improved && <span style={{fontSize:10,color:LGREEN,backgroundColor:"rgba(168,197,160,0.15)",borderRadius:10,padding:"3px 8px"}}>前進</span>}
          </div>
        ) : (
          <div style={{display:"inline-flex",alignItems:"center",gap:8,borderRadius:20,padding:"7px 18px",border:`1px solid ${w.accent}60`,backgroundColor:w.bg,marginBottom:12}}>
            <span style={{fontSize:18}}>{w.emoji}</span>
            <span style={{fontSize:14,fontWeight:700,color:w.accent,fontFamily:"'Noto Serif JP',serif"}}>{w.label}</span>
          </div>
        )}
        <h2 style={{fontSize:20,fontWeight:700,color:"#F5F0E8",letterSpacing:2,marginBottom:4,fontFamily:"'Noto Serif JP',serif"}}>今日の整理</h2>
        {changeMsg && <p style={{fontSize:12,color:LGREEN,lineHeight:1.7,marginTop:8,padding:"0 20px"}}>{changeMsg}</p>}
      </div>

      <div style={{maxWidth:460,margin:"0 auto",display:"flex",flexDirection:"column",gap:12}}>
        {sections.map(sec=>{
          const content = report[sec.key];
          if (!content) return null;
          return <RC key={sec.key} label={sec.label} color={sec.color} content={content}/>;
        })}
        {report.firstStep && (
          <div style={{backgroundColor:LGREEN,borderRadius:14,padding:"18px 20px"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#2A3828",letterSpacing:2,marginBottom:10}}>最初の一歩</div>
            <div style={{fontSize:15,fontWeight:600,color:"#1A2A1B",lineHeight:1.8}}>{report.firstStep}</div>
          </div>
        )}
      </div>

      <div style={{maxWidth:460,margin:"24px auto 0",textAlign:"center"}}>
        <div style={{padding:"18px 22px",backgroundColor:"rgba(168,197,160,0.08)",borderRadius:12,marginBottom:20,border:"1px solid rgba(168,197,160,0.15)"}}>
          <p style={{fontSize:12,color:LGREEN,lineHeight:2.0,margin:0}}>
            ここで見えた天気は、あなたの中にあったもの。<br/>
            話すことで、自分が見えてくることがあります。<br/>
            <span style={{fontSize:11,opacity:0.8}}>あなたのペースで、いつでも。</span>
          </p>
        </div>
        <button onClick={onMore} style={{backgroundColor:GREEN,color:"#FFF8F0",border:"none",borderRadius:24,padding:"13px 24px",fontSize:13,cursor:"pointer",fontFamily:F,width:"100%",marginBottom:12}}>
          もう少し深く整理する
        </button>
        <button onClick={onReset} style={{backgroundColor:"transparent",border:`1px solid rgba(168,197,160,0.4)`,color:LGREEN,borderRadius:30,padding:"11px 32px",fontSize:13,cursor:"pointer",fontFamily:F}}>
          もう一度、話してみる
        </button>
      </div>
    </div>
  );
}

function RC({ label, color, content }) {
  return (
    <div style={{backgroundColor:"rgba(255,255,255,0.06)",borderRadius:14,padding:"14px 18px",border:"1px solid rgba(255,255,255,0.08)"}}>
      <div style={{fontSize:10,fontWeight:700,color,letterSpacing:2,marginBottom:8,borderLeft:`3px solid ${color}`,paddingLeft:8}}>{label}</div>
      <p style={{fontSize:13,color:"#E8EDE6",lineHeight:1.9,margin:0}}>{content}</p>
    </div>
  );
}

// ============================================================
// DEEP INTRO
// ============================================================
function DeepIntro({ onBack }) {
  return (
    <div style={{minHeight:"100vh",backgroundColor:CREAM,fontFamily:F}}>
      <div style={{height:3,background:`linear-gradient(to right,${GOLD},${GOLD2})`}}/>
      <div style={{maxWidth:460,margin:"0 auto",padding:"32px 24px 48px"}}>
        <button style={{background:"none",border:"none",color:BROWN,fontSize:14,cursor:"pointer",marginBottom:28,padding:0,fontFamily:F}} onClick={onBack}>← 戻る</button>
        <p style={{fontSize:11,color:BROWN,letterSpacing:3,marginBottom:12}}>LIVE-As について</p>
        <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:20,fontWeight:700,color:DARK,lineHeight:1.7,marginBottom:16}}>
          お転機診断は、<br/>今の天気を知るための場所。
        </h2>
        <p style={{fontSize:13,color:"#5C5040",lineHeight:1.95,marginBottom:24}}>
          ここで見えた天気は、あなたの中にあったもの。<br/>
          話してみることで、何かが見えてきたり、整理されたりすることがあります。<br/>
          <br/>
          <strong style={{color:DARK}}>もう少し続けて整理してみたい</strong>と感じたら、LIVE-As では、<br/>
          あなたのペースで、もう一段深く整理していくことができます。
        </p>

        <div style={{borderTop:`1px solid ${WG}`,paddingTop:20,marginTop:8,marginBottom:20}}>
          <p style={{fontSize:11,color:BROWN,letterSpacing:2,marginBottom:14}}>LIVE-As でできること</p>
          {[
            {num:"①",title:"今の状況を整理する",desc:"家族・仕事・暮らしの全体像を、あなたの言葉でゆっくり整理していきます。"},
            {num:"②",title:"気持ちに気づいていく",desc:"何が重くなっているか、何を守りたいか。少しずつ見えてくるものがあります。"},
            {num:"③",title:"これからを描く",desc:"今すぐ決めなくていいこと、今日から動けること。自分のペースで見つけていきます。"},
          ].map(item=>(
            <div key={item.num} style={{display:"flex",gap:14,marginBottom:18}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:`linear-gradient(135deg,${GOLD},${GOLD2})`,color:NAVY,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{item.num}</div>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:DARK,marginBottom:4}}>{item.title}</div>
                <div style={{fontSize:12,color:"#6B6055",lineHeight:1.85}}>{item.desc}</div>
              </div>
            </div>
          ))}
        </div>

        <div style={{padding:"14px 18px",backgroundColor:NAVY,borderRadius:12,marginBottom:16}}>
          <p style={{fontSize:12,color:"rgba(255,255,255,0.85)",lineHeight:1.95,margin:0}}>
            決めるのは、いつもあなた自身。<br/>
            <span style={{color:GOLD2,fontWeight:500}}>LIVE-As は、その整理をそっと支える場所です。</span>
          </p>
        </div>

        <div style={{padding:"12px 16px",backgroundColor:"#EEE9DF",borderRadius:12}}>
          <p style={{fontSize:11,color:"#6B6055",lineHeight:1.8,margin:0}}>LIVE-As 本体は現在準備中です。近日公開予定。</p>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// 共通
// ============================================================
function StepShell({ eye, title, sub, pct, onBack, children }) {
  return (
    <div style={{minHeight:"100vh",backgroundColor:CREAM,fontFamily:F}}>
      <div style={{height:3,backgroundColor:WG}}>
        <div style={{height:"100%",background:`linear-gradient(to right,${GOLD},${GOLD2})`,width:`${pct}%`,transition:"width 0.4s ease"}}/>
      </div>
      <div style={{maxWidth:460,margin:"0 auto",padding:"28px 24px 48px"}}>
        <button style={{background:"none",border:"none",color:BROWN,fontSize:14,cursor:"pointer",marginBottom:28,padding:0,fontFamily:F}} onClick={onBack}>← 戻る</button>
        <div style={{textAlign:"center",marginBottom:32}}>
          <p style={{fontSize:11,color:BROWN,letterSpacing:3,marginBottom:12}}>{eye}</p>
          <h2 style={{fontSize:19,fontWeight:600,color:DARK,marginBottom:8,lineHeight:1.5,fontFamily:"'Noto Serif JP',serif"}}>{title}</h2>
          <p style={{fontSize:13,color:"#8C8070"}}>{sub}</p>
        </div>
        {children}
      </div>

}

const BB = {background:`linear-gradient(135deg,${GOLD},${GOLD2})`,color:NAVY,border:"none",borderRadius:30,padding:"15px 36px",fontSize:14,cursor:"pointer",letterSpacing:1,boxShadow:"0 4px 16px rgba(201,168,76,0.4)",fontFamily:F,fontWeight:700};
const OB = {width:"100%",backgroundColor:"#FFF8F0",border:`1.5px solid ${WG}`,borderRadius:12,padding:"15px 20px",fontSize:14,color:DARK,cursor:"pointer",textAlign:"left",fontFamily:F,lineHeight:1.6};
const OO = {backgroundColor:"#F0F5EE",border:`1.5px solid ${GREEN}`,color:GREEN,fontWeight:600};
const CB = {backgroundColor:"#FFF8F0",border:`1px solid ${WG}`,borderRadius:20,padding:"9px 16px",fontSize:13,color:"#5C5040",cursor:"pointer",fontFamily:F};
const CO = {backgroundColor:GREEN,border:`1px solid ${GREEN}`,color:"#FFF8F0"};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
